<!DOCTYPE html>
<html>
<head>
<title>Professional UID Marketplace</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>🔥 Professional UID Marketplace</h1>
<div class="help">
Search UIDs, copy them, and contact us for purchases via Discord / Telegram.<br>
All UIDs can be bound to any region.
</div>
</header>

<div id="stats">
<span id="totalUIDs">Total UIDs: 0</span> |
<span id="topUID">Top UID: -</span>
</div>

<div id="search-container">
<input type="text" id="search" placeholder="Search UID..." onkeyup="filterUIDs()">
</div>

<table id="uidTable">
<thead>
<tr>
<th>#</th>
<th>UID</th>
<th>Score</th>
<th>Buy</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let uidData=[];
let filteredData=[];

// Fetch uid.json automatically
fetch("uid.json")
.then(res=>res.json())
.then(data=>{
    uidData = data;
    filteredData = uidData;
    updateStats();
    displayUIDs(filteredData);
})
.catch(err=>{
    alert("Error fetching uid.json: "+err);
});

// Update UID stats
function updateStats(){
    document.getElementById("totalUIDs").textContent = "Total UIDs: "+uidData.length;
    if(uidData.length>0){
        const top = uidData.reduce((a,b)=> b.score>a.score?b:a);
        document.getElementById("topUID").textContent = `Top UID: ${top.uid} (Score: ${top.score})`;
    }
}

// Display UID table
function displayUIDs(data){
    const tbody = document.querySelector("#uidTable tbody");
    tbody.innerHTML="";
    const fragment = document.createDocumentFragment();
    data.forEach(d=>{
        const tr = document.createElement("tr");

        // Rank, UID, Score columns
        tr.innerHTML = `
            <td>${d.rank}</td>
            <td class="copy">${d.uid}</td>
            <td>${d.score}</td>
            <td>
                <button class="buy" onclick="contact('${d.uid}')">Buy</button>
            </td>
        `;

        // Click UID to copy
        tr.querySelector(".copy").onclick = ()=>copyUID(d.uid);

        fragment.appendChild(tr);
    });
    tbody.appendChild(fragment);
}

// Search/filter
function filterUIDs(){
    const input = document.getElementById("search").value.trim();
    if(!input){
        displayUIDs(uidData);
        return;
    }
    const filtered = uidData.filter(x=> x.uid.includes(input));
    displayUIDs(filtered);
}

// Copy UID
function copyUID(uid){
    navigator.clipboard.writeText(uid);
    alert("UID Copied: "+uid);
}

// Contact / Buy button
function contact(uid){
    const msg = `Interested in UID ${uid}. Contact us via Discord or Telegram!`;
    const discord = "https://discord.gg/yourserver";
    const telegram = "https://t.me/yourchannel";
    alert(msg);
    // Open links
    window.open(discord, "_blank");
    window.open(telegram, "_blank");
}
</script>
</body>
</html>
